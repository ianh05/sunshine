<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>New Sunshine — International Driving School, Japan</title>
  <link rel="icon" type="image/png" href="logo.JPG">
  <link rel="apple-touch-icon" href="logo.JPG">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <!-- App device column. The shell renders top bar / content / tab bar into #app. -->
  <div id="app" class="app-frame">
    <header id="topbar"></header>
    <main id="content" class="content" tabindex="-1"></main>
    <nav id="tabbar" class="tabbar" aria-label="Primary"></nav>
  </div>

  <!-- Language switcher sheet (toggled by the top-bar pill / More → Language) -->
  <div id="lang-sheet" class="sheet" hidden></div>

  <script type="module" src="js/main.js"></script>
</body>
